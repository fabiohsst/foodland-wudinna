name: Auto Order Sheet

# Triggered automatically when Apps Script commits the SOH file to
# 03_model/inputs/ after the 1 PM email arrives on Wednesday or Friday.
# The SOH is always the last file to arrive, so its commit is a reliable gate:
# by then the specials file (committed earlier that week) is already in the repo.
# Can also be triggered manually from the GitHub Actions tab.
on:
  push:
    paths:
      - "03_model/inputs/stock_on_hand_*.xlsx"
  workflow_dispatch:

jobs:
  generate-order:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas numpy lightgbm pyarrow openpyxl python-docx requests

      # ── Locate and prepare input files ──────────────────────────────────────
      # Apps Script commits stock_on_hand_YYYY-MM-DD.xlsx and specials_YYYY-MM-DD.doc[x].
      # .doc (binary Word 97) cannot be parsed by python-docx or the LLM zipfile
      # extractor — convert to .docx using LibreOffice before passing to the script.
      - name: Locate and prepare input files
        id: inputs
        run: |
          echo "=== Contents of 03_model/inputs/ ==="
          ls -lh 03_model/inputs/

          # SOH: pick the most recent dated file
          SOH_FILE=$(ls 03_model/inputs/stock_on_hand_*.xlsx 2>/dev/null | sort | tail -1)
          if [ -z "$SOH_FILE" ]; then
            echo "ERROR: No stock_on_hand_*.xlsx found in 03_model/inputs/" >&2
            exit 1
          fi
          echo "SOH file: $SOH_FILE"
          echo "soh_path=$SOH_FILE" >> $GITHUB_OUTPUT

          # SPECIALS: pick the two most recent specials files (handles FRI_TUE two-cycle case)
          # Convert any .doc to .docx so python-docx can parse them.
          SPECIALS_FILES=($(ls 03_model/inputs/specials_*.doc* 2>/dev/null | sort))
          if [ ${#SPECIALS_FILES[@]} -eq 0 ]; then
            echo "ERROR: No specials_*.doc* found in 03_model/inputs/" >&2
            exit 1
          fi

          CONVERTED=()
          for f in "${SPECIALS_FILES[@]}"; do
            if [[ "$f" == *.doc && ! "$f" == *.docx ]]; then
              echo "Converting $f → .docx"
              libreoffice --headless --convert-to docx "$f" --outdir 03_model/inputs/ 2>/dev/null
              CONVERTED+=("${f%.doc}.docx")
            else
              CONVERTED+=("$f")
            fi
          done

          # Current specials = most recent; next specials = second most recent (if exists)
          N=${#CONVERTED[@]}
          SPECIALS_CURRENT="${CONVERTED[$((N-1))]}"
          SPECIALS_NEXT="${CONVERTED[$((N-2))]}"

          echo "Specials (current): $SPECIALS_CURRENT"
          echo "specials_current=$SPECIALS_CURRENT" >> $GITHUB_OUTPUT

          if [ $N -ge 2 ]; then
            echo "Specials (next):    $SPECIALS_NEXT"
            echo "specials_next=$SPECIALS_NEXT" >> $GITHUB_OUTPUT
          fi

      # ── Generate order sheet ─────────────────────────────────────────────────
      - name: Generate order sheet
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SPECIALS_NEXT="${{ steps.inputs.outputs.specials_next }}"

          if [ -n "$SPECIALS_NEXT" ]; then
            output=$(python generate_order_headless.py \
              --soh      "${{ steps.inputs.outputs.soh_path }}" \
              --specials "${{ steps.inputs.outputs.specials_current }}" \
              --specials-next "$SPECIALS_NEXT" \
              --output /tmp/order_sheet.xlsx)
          else
            output=$(python generate_order_headless.py \
              --soh      "${{ steps.inputs.outputs.soh_path }}" \
              --specials "${{ steps.inputs.outputs.specials_current }}" \
              --output /tmp/order_sheet.xlsx)
          fi

          echo "$output"
          echo "output_path=$(echo "$output" | grep OUTPUT_PATH | cut -d= -f2)" >> $GITHUB_OUTPUT

      # ── Send order sheet by email ────────────────────────────────────────────
      - name: Send order sheet email
        env:
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          ORDER_RECIPIENTS:    ${{ secrets.ORDER_RECIPIENTS }}
        run: |
          python send_order_email.py --file /tmp/order_sheet.xlsx

      # ── Alert on unexpected failure ──────────────────────────────────────────
      - name: Alert — generation failed
        if: failure() && steps.generate.outcome == 'failure'
        env:
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          ORDER_RECIPIENTS:    ${{ secrets.ORDER_RECIPIENTS }}
        run: |
          python send_order_email.py \
            --alert "The order sheet generation step failed unexpectedly. \
          Check the GitHub Actions log for details: \
          https://github.com/fabiohsst/foodland-wudinna/actions"
